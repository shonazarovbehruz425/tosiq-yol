<!doctype html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Dots &amp; Boxes</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* ══ BASE ══ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --primary: #7c3aed;
      --primary-gradient: linear-gradient(135deg, #7c3aed, #4338ca);
      --primary-glow: rgba(124,58,237,.35);
      --pill-bg: rgba(255,255,255,.06);
      --pill-border: rgba(255,255,255,.09);
      --text-color: #f1f5f9;
      --text-secondary: #6b7280;
      --font-sans: -apple-system, 'Segoe UI', system-ui, sans-serif;
      --border-radius-full: 999px;
      --transition-fast: .15s ease;
      --transition-normal: .25s ease;
      --qbg-line: rgba(124,58,237,.10);
    }
    html, body { height: 100%; overflow: hidden; font-family: var(--font-sans); background: #090c14; color: var(--text-color); user-select: none; -webkit-user-select: none; }
    body { display: flex; flex-direction: column; height: 100dvh; }

    /* ══ SCREENS ══ */
    .screen { display: none; flex-direction: column; height: 100%; overflow: hidden; position: relative; z-index: 1; }
    .screen.active { display: flex; }

    /* ══════════════════════════════════
       WRONGWAY BACKGROUND (qbg)
    ═══════════════════════════════════ */
    .qbg {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden; pointer-events: none;
    }
    .qbg-grid {
      position: absolute; inset: -2px;
      background-image:
        linear-gradient(to right, var(--qbg-line) 1px, transparent 1px),
        linear-gradient(to bottom, var(--qbg-line) 1px, transparent 1px);
      background-size: 42px 42px;
      -webkit-mask-image: radial-gradient(130% 90% at 50% 30%, #000 55%, transparent 100%);
      mask-image: radial-gradient(130% 90% at 50% 30%, #000 55%, transparent 100%);
      animation: qbgGridDrift 35s linear infinite;
    }
    @keyframes qbgGridDrift { from{background-position:0 0,0 0;} to{background-position:42px 42px,42px 42px;} }
    .qbg-items { position: absolute; inset: 0; }
    .qbg-wall { position: absolute; border-radius: 5px; opacity: .6; animation-name: qbgFloat; animation-timing-function: ease-in-out; animation-iteration-count: infinite; will-change: transform; }
    .qbg-wall.h { width: 64px; height: 11px; }
    .qbg-wall.v { width: 11px; height: 64px; }
    .qbg-wall.red  { background: linear-gradient(135deg,#ef4444,#dc2626); box-shadow: 0 4px 16px rgba(239,68,68,.45); }
    .qbg-wall.blue { background: linear-gradient(135deg,#3b82f6,#2563eb); box-shadow: 0 4px 16px rgba(59,130,246,.45); }
    .qbg-pawn { position: absolute; width: 22px; height: 22px; border-radius: 50%; opacity: .65; animation-name: qbgPawnFloat; animation-timing-function: ease-in-out; animation-iteration-count: infinite; will-change: transform; }
    .qbg-pawn.red  { background: radial-gradient(circle at 35% 30%,#ff7a7a,#ef4444 55%,#b91c1c); box-shadow: 0 0 18px rgba(239,68,68,.7); }
    .qbg-pawn.blue { background: radial-gradient(circle at 35% 30%,#93c5fd,#3b82f6 55%,#1d4ed8); box-shadow: 0 0 18px rgba(59,130,246,.7); }
    @keyframes qbgFloat     { 0%{transform:translate(0,0) rotate(0);} 25%{transform:translate(14px,-18px) rotate(2deg);} 50%{transform:translate(-10px,-30px) rotate(-2deg);} 75%{transform:translate(-16px,-12px) rotate(1deg);} 100%{transform:translate(0,0) rotate(0);} }
    @keyframes qbgPawnFloat { 0%{transform:translate(0,0) scale(1);} 33%{transform:translate(10px,-16px) scale(1.08);} 66%{transform:translate(-12px,-8px) scale(.95);} 100%{transform:translate(0,0) scale(1);} }
    @media (prefers-reduced-motion:reduce) { .qbg-grid,.qbg-wall,.qbg-pawn { animation:none !important; } }

    /* ══════════════════════════════════
       MENU SCREEN (WrongWay uslubida)
    ═══════════════════════════════════ */
    #s-menu {
      justify-content: flex-start;
      background: radial-gradient(ellipse 120% 55% at 50% 0%, #1b1040 0%, transparent 70%);
      overflow-y: auto;
    }

    /* Header */
    .menu-header { text-align: center; padding: 36px 24px 20px; position: relative; z-index: 1; }
    .logo-container { margin-bottom: 12px; }
    .logo-svg { width: 56px; height: 56px; fill: var(--primary); filter: drop-shadow(0 0 14px rgba(124,58,237,.6)); }
    .menu-title  { font-size: 32px; font-weight: 900; letter-spacing: 1.5px; background: linear-gradient(135deg,#c4b5fd,#7c3aed); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .menu-slogan { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-secondary); margin-top: 6px; }

    /* Pills list */
    .menu-actions {
      display: flex; flex-direction: column; gap: 10px;
      padding: 0 16px; max-width: 420px; width: 100%; margin: 0 auto;
      position: relative; z-index: 1;
    }

    /* WRONGWAY menu-pill — exact copy */
    .menu-pill {
      position: relative; display: flex; align-items: center; gap: 14px;
      width: 100%; height: 66px; padding: 0 22px;
      border-radius: var(--border-radius-full);
      font-family: var(--font-sans); font-size: 18px; font-weight: 700;
      color: var(--text-color);
      background-color: var(--pill-bg);
      border: 1.5px solid var(--pill-border);
      box-shadow: 0 4px 14px rgba(0,0,0,.10);
      cursor: pointer;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      transition: transform var(--transition-fast), box-shadow var(--transition-normal);
    }
    .menu-pill:active { transform: scale(.97); }

    .menu-pill-primary {
      color: #fff;
      background: var(--primary-gradient);
      border: none;
      box-shadow: 0 8px 22px var(--primary-glow);
    }
    .menu-pill-primary:active { box-shadow: 0 4px 12px var(--primary-glow); }

    .menu-pill-icon {
      width: 40px; height: 40px; flex-shrink: 0;
      border-radius: 13px;
      display: inline-flex; align-items: center; justify-content: center;
      color: #fff;
      animation: iconFloat 3s ease-in-out infinite;
    }
    .menu-pill:nth-child(1) .menu-pill-icon { animation-delay: 0s; }
    .menu-pill:nth-child(2) .menu-pill-icon { animation-delay: .4s; }
    .menu-pill:nth-child(3) .menu-pill-icon { animation-delay: .8s; }
    .menu-pill:nth-child(4) .menu-pill-icon { animation-delay: 1.2s; }
    @keyframes iconFloat { 0%,100%{transform:translateY(0) rotate(0);} 50%{transform:translateY(-4px) rotate(-2deg);} }
    @media (prefers-reduced-motion:reduce) { .menu-pill-icon { animation: none; } }

    .menu-pill-icon svg { width: 22px; height: 22px; }
    .menu-pill-label { line-height: 1; flex: 1; }
    .menu-pill-chevron { flex-shrink:0; width:28px; height:28px; display:inline-flex; align-items:center; justify-content:center; color:var(--text-secondary); }
    .menu-pill-chevron svg { width:22px; height:22px; }

    .menu-pill-primary .menu-pill-icon { background:rgba(255,255,255,.2); box-shadow:none; }

    /* Icon colours matching WrongWay */
    .icon-3x3   { background:linear-gradient(135deg,#38bdf8,#2563eb); box-shadow:0 4px 10px rgba(37,99,235,.4); }
    .icon-4x4   { background:linear-gradient(135deg,#34d399,#059669); box-shadow:0 4px 10px rgba(5,150,105,.35); }
    .icon-5x5   { background:linear-gradient(135deg,#fb7185,#e11d48); box-shadow:0 4px 10px rgba(225,29,72,.35); }
    .icon-friend{ background:linear-gradient(135deg,#34d399,#059669); box-shadow:0 4px 10px rgba(5,150,105,.35); }
    .icon-bot   { background:linear-gradient(135deg,#fb7185,#e11d48); box-shadow:0 4px 10px rgba(225,29,72,.35); }
    .icon-easy  { background:linear-gradient(135deg,#34d399,#059669); box-shadow:0 4px 10px rgba(5,150,105,.35); }
    .icon-medium{ background:linear-gradient(135deg,#fbbf24,#f59e0b); box-shadow:0 4px 10px rgba(245,158,11,.4); }
    .icon-hard  { background:linear-gradient(135deg,#fb7185,#e11d48); box-shadow:0 4px 10px rgba(225,29,72,.35); }

    /* Sub-screens inside menu (size / mode / diff selection) */
    .sub-title { font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-secondary); padding: 0 16px 10px; position:relative;z-index:1; text-align:center; }
    .menu-footer { display:flex; justify-content:center; gap:20px; padding:20px 16px calc(env(safe-area-inset-bottom,12px)+12px); position:relative;z-index:1; }
    .back-link { font-size:13px; font-weight:600; color:var(--text-secondary); cursor:pointer; background:none; border:none; font-family:inherit; }
    .back-link:active { opacity:.7; }

    /* ══ GAME ══ */
    #s-game { background: radial-gradient(ellipse 100% 45% at 50% 0%, #110e28 0%, #090c14 58%); }
    .ghdr { display:flex; align-items:center; justify-content:space-between; padding:calc(env(safe-area-inset-top,10px)+8px) 14px 8px; flex-shrink:0; }
    .ico-btn { width:38px; height:38px; border-radius:50%; border:1px solid rgba(255,255,255,.07); background:rgba(255,255,255,.04); color:#8a93b0; display:flex; align-items:center; justify-content:center; cursor:pointer; font-family:inherit; }
    .ico-btn svg { width:18px; height:18px; }
    .gtitle { font-size:13px; font-weight:700; color:#3d4663; letter-spacing:1px; }

    .scoreboard { display:flex; align-items:center; gap:10px; padding:0 14px 8px; flex-shrink:0; }
    .scard { flex:1; background:rgba(255,255,255,.04); border:1.5px solid rgba(255,255,255,.06); border-radius:14px; padding:9px 12px; transition:border-color .3s,box-shadow .3s; }
    .scard.act1 { border-color:#7c3aed; box-shadow:0 0 18px rgba(124,58,237,.22); }
    .scard.act2 { border-color:#e11d48; box-shadow:0 0 18px rgba(225,29,72,.22); }
    .sname { font-size:10px; color:#5a6380; font-weight:600; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sval { font-size:26px; font-weight:900; line-height:1; }
    #sv1 { color:#a78bfa; } #sv2 { color:#fb7185; }
    .vs { color:#2d3348; font-size:12px; font-weight:800; flex-shrink:0; }

    .tbar { text-align:center; padding:0 14px 6px; font-size:13px; font-weight:600; color:#5a6380; flex-shrink:0; }
    .tpip { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px; vertical-align:middle; }
    .thinking { display:inline-flex; gap:4px; align-items:center; }
    .thinking span { width:5px; height:5px; border-radius:50%; background:#5a6380; animation:bob 1.2s ease-in-out infinite; }
    .thinking span:nth-child(2){animation-delay:.2s;} .thinking span:nth-child(3){animation-delay:.4s;}
    @keyframes bob { 0%,80%,100%{transform:scale(.5);opacity:.3;} 40%{transform:scale(1);opacity:1;} }

    #cw { flex:1; overflow:hidden; position:relative; margin:0 4px; }
    #gc { display:block; touch-action:none; }

    /* ══ REACTIONS ══ */
    .reaction-strip { display:flex; align-items:center; justify-content:center; gap:10px; padding:6px 14px 8px; flex-shrink:0; }
    .rx-btn { width:44px; height:44px; border-radius:50%; border:1.5px solid rgba(255,255,255,.08); background:rgba(255,255,255,.05); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform .15s,box-shadow .15s; position:relative; }
    .rx-btn svg { width:28px; height:28px; }
    .rx-btn:active { transform:scale(.88); }
    .rx-btn.glow-laugh{box-shadow:0 0 0 2px #34d399;} .rx-btn.glow-fire{box-shadow:0 0 0 2px #f97316;} .rx-btn.glow-wow{box-shadow:0 0 0 2px #a78bfa;} .rx-btn.glow-angry{box-shadow:0 0 0 2px #fb7185;} .rx-btn.glow-wave{box-shadow:0 0 0 2px #38bdf8;}

    .floating-emoji { position:absolute; pointer-events:none; z-index:300; display:flex; align-items:center; justify-content:center; animation:floatUp 1.6s cubic-bezier(.22,.61,.36,1) forwards; }
    .floating-emoji.floating-reaction { animation:reactionFloat 1.6s cubic-bezier(.22,.61,.36,1) forwards; }
    .floating-emoji-svg { width:74px; height:74px; }
    .reaction-art { display:flex; align-items:center; justify-content:center; width:74px; height:74px; border-radius:50%; border:3px solid rgba(255,255,255,.15); background:rgba(0,0,0,.35); backdrop-filter:blur(6px); box-shadow:0 0 20px var(--rc,#7c3aed); }
    .reaction-art-anim { width:74px; height:74px; }
    .reaction-art-anim .ra-svg { width:60px; height:60px; display:block; }
    @keyframes floatUp { 0%{transform:translateY(0) scale(.5);opacity:0;} 15%{opacity:1;transform:translateY(-10px) scale(1.1);} 80%{opacity:.9;} 100%{transform:translateY(-120px) scale(.85);opacity:0;} }
    @keyframes reactionFloat { 0%{transform:translateY(10px) scale(.3);opacity:0;} 14%{transform:translateY(-6px) scale(1.15);opacity:1;} 24%{transform:translateY(-10px) scale(1);opacity:1;} 78%{transform:translateY(-70px) scale(1);opacity:1;} 100%{transform:translateY(-130px) scale(.85);opacity:0;} }
    .ra-laugh{animation:raLaughBounce .4s ease-in-out infinite;transform-origin:50% 60%;} .ra-laugh .ra-mouth{animation:raMouthOpen .4s ease-in-out infinite;transform-origin:50% 60%;}
    @keyframes raLaughBounce{0%,100%{transform:rotate(-6deg) translateY(0);}50%{transform:rotate(6deg) translateY(-2px);}} @keyframes raMouthOpen{0%,100%{transform:scaleY(.7);}50%{transform:scaleY(1.15);}}
    .ra-fire .ra-flame{animation:raFlicker .28s ease-in-out infinite;transform-origin:50% 90%;}
    @keyframes raFlicker{0%,100%{transform:scale(1) skewX(0);}35%{transform:scale(1.08,.96) skewX(-4deg);}70%{transform:scale(.95,1.06) skewX(4deg);}}
    .ra-wow{animation:raWowZoom 1s ease-in-out;transform-origin:50%;} .ra-wow .ra-mouth,.ra-wow .ra-eye{animation:raWowMouth .9s ease-in-out;transform-origin:center;}
    @keyframes raWowZoom{0%{transform:scale(.8);}30%{transform:scale(1.12);}100%{transform:scale(1);}} @keyframes raWowMouth{0%{transform:scale(.4);}40%{transform:scale(1.25);}100%{transform:scale(1);}}
    .ra-angry{animation:raShake .18s linear infinite;transform-origin:50%;}
    @keyframes raShake{0%,100%{transform:translateX(0) rotate(0);}25%{transform:translateX(-2px) rotate(-3deg);}75%{transform:translateX(2px) rotate(3deg);}}
    .ra-wave .ra-hand{animation:raWaveHand .5s ease-in-out infinite;transform-origin:50% 85%;}
    @keyframes raWaveHand{0%,100%{transform:rotate(-14deg);}50%{transform:rotate(14deg);}}

    .confetti-particle{position:absolute;pointer-events:none;z-index:400;animation:confettiFall 3s ease-in-out forwards;}
    @keyframes confettiFall{0%{transform:translateY(-10px) rotate(0);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}

    /* ══ FOOTER ══ */
    .gfoot { display:flex; justify-content:center; gap:10px; padding:6px 14px calc(env(safe-area-inset-bottom,8px)+4px); flex-shrink:0; }
    .fbt { display:flex; align-items:center; gap:6px; padding:9px 18px; border-radius:12px; border:1px solid rgba(255,255,255,.07); background:rgba(255,255,255,.04); color:#8a93b0; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
    .fbt svg { width:14px; height:14px; }
    .fbt:disabled { opacity:.3; cursor:default; }

    /* ══ RESULT (WrongWay uslubida) ══ */
    #s-result { align-items:center; justify-content:center; background:radial-gradient(ellipse 100% 60% at 50% 0%,#12102a 0%,#090c14 65%); overflow:hidden; }
    .result-card { background:#111624; border:1px solid rgba(255,255,255,.09); border-radius:24px; padding:32px 24px; text-align:center; width:85%; max-width:340px; box-shadow:0 28px 60px rgba(0,0,0,.7); position:relative; animation:rcPop .38s cubic-bezier(.34,1.56,.64,1); }
    @keyframes rcPop{from{transform:scale(.72);opacity:0;}to{transform:scale(1);opacity:1;}}
    .result-card.result-win  { border-color:rgba(124,58,237,.35); }
    .result-card.result-lose { border-color:rgba(225,29,72,.25); }
    .result-card.result-draw { border-color:rgba(56,189,248,.25); }
    .result-icon-halo { width:80px; height:80px; border-radius:50%; margin:0 auto 16px; display:flex; align-items:center; justify-content:center; }
    .result-win  .result-icon-halo { background:radial-gradient(circle,rgba(124,58,237,.35) 0%,transparent 70%); }
    .result-lose .result-icon-halo { background:radial-gradient(circle,rgba(225,29,72,.25) 0%,transparent 70%); }
    .result-draw .result-icon-halo { background:radial-gradient(circle,rgba(56,189,248,.25) 0%,transparent 70%); }
    .result-icon { width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .result-win  .result-icon { background:rgba(124,58,237,.2); color:#a78bfa; }
    .result-lose .result-icon { background:rgba(225,29,72,.15); color:#fb7185; }
    .result-draw .result-icon { background:rgba(56,189,248,.15); color:#7dd3fc; }
    .result-icon svg { width:30px; height:30px; }
    .result-title { font-size:26px; font-weight:900; margin-bottom:6px; }
    .result-win  .result-title { color:#c4b5fd; }
    .result-lose .result-title { color:#fb7185; }
    .result-draw .result-title { color:#7dd3fc; }
    .result-desc { font-size:14px; color:#5a6380; margin-bottom:12px; }
    .result-stat { display:inline-flex; align-items:center; gap:6px; font-size:13px; color:#6b7280; margin-bottom:20px; }
    .result-stat svg { width:15px; height:15px; }
    .result-score-row { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:20px; }
    .rscore-box { text-align:center; }
    .rscore-name { font-size:11px; color:#5a6380; margin-bottom:4px; }
    .rscore-val { font-size:40px; font-weight:900; }
    .rscore-p1 { color:#a78bfa; } .rscore-p2 { color:#fb7185; }
    .rscore-sep { font-size:20px; color:#2d3348; font-weight:800; }
    .result-actions { display:flex; flex-direction:column; gap:10px; }
    .res-btn-primary { padding:14px; border-radius:14px; border:none; background:var(--primary-gradient); color:#fff; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
    .res-btn-sec     { padding:13px; border-radius:14px; border:1px solid rgba(255,255,255,.09); background:rgba(255,255,255,.05); color:#d1d5db; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
  </style>
</head>
<body>

<!-- ══ WRONGWAY BACKGROUND (persistent, all screens) ══ -->
<div class="qbg" aria-hidden="true">
  <div class="qbg-grid"></div>
  <div class="qbg-items">
    <!-- walls: type color left% top% anim-dur delay -->
    <span class="qbg-wall h red"  style="left:12%;top:14%;animation-duration:16s;animation-delay:0s"></span>
    <span class="qbg-wall h blue" style="left:64%;top:9%;animation-duration:19s;animation-delay:-5s"></span>
    <span class="qbg-wall v blue" style="left:8%;top:52%;animation-duration:18s;animation-delay:-3s"></span>
    <span class="qbg-wall h red"  style="left:78%;top:60%;animation-duration:17s;animation-delay:-7s"></span>
    <span class="qbg-wall h blue" style="left:22%;top:82%;animation-duration:20s;animation-delay:-9s"></span>
    <span class="qbg-wall v red"  style="left:88%;top:30%;animation-duration:15s;animation-delay:-6s"></span>
    <span class="qbg-wall v blue" style="left:44%;top:70%;animation-duration:21s;animation-delay:-11s"></span>
    <span class="qbg-wall h red"  style="left:52%;top:38%;animation-duration:18s;animation-delay:-13s"></span>
    <!-- pawns: color left% top% dur delay -->
    <span class="qbg-pawn red"  style="left:56%;top:68%;animation-duration:8s;animation-delay:0s"></span>
    <span class="qbg-pawn blue" style="left:30%;top:26%;animation-duration:9s;animation-delay:-3s"></span>
    <span class="qbg-pawn red"  style="left:82%;top:46%;animation-duration:10s;animation-delay:-5s"></span>
    <span class="qbg-pawn blue" style="left:16%;top:74%;animation-duration:8.5s;animation-delay:-2s"></span>
  </div>
</div>

<!-- ════════════════════════════════
     MENU SCREEN — WrongWay uslubida
════════════════════════════════ -->
<div id="s-menu" class="screen active">
  <!-- Header -->
  <div class="menu-header">
    <div class="logo-container">
      <!-- 4 dots in a grid = Dots & Boxes logo -->
      <svg class="logo-svg" viewBox="0 0 24 24">
        <circle cx="6"  cy="6"  r="2.5" fill="currentColor"/>
        <circle cx="18" cy="6"  r="2.5" fill="currentColor"/>
        <circle cx="6"  cy="18" r="2.5" fill="currentColor"/>
        <circle cx="18" cy="18" r="2.5" fill="currentColor"/>
        <path d="M6 6h12M6 18h12M6 6v12M18 6v12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
      </svg>
    </div>
    <h1 class="menu-title">DOTS &amp; BOXES</h1>
    <p class="menu-slogan">Mantiqiy Neon Jang</p>
  </div>

  <!-- Main menu pills -->
  <div class="menu-actions" id="main-pills">
    <button class="menu-pill menu-pill-primary" id="btn-local">
      <span class="menu-pill-icon" style="background:rgba(255,255,255,.22)">

// ══ AUDIO ══
let _actx=null,_nSrc=null,_nGain=null;
const _meme={};
function actx(){if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();if(_actx.state==='suspended')_actx.resume();return _actx;}
async function preloadMemes(){const files=[{id:'sound1',url:'/sounds/sound1.m4a'},{id:'sound2',url:'/sounds/sound2.m4a'},{id:'sound3',url:'/sounds/sound3.m4a'},{id:'sound4',url:'/sounds/sound4.m4a'}];const ctx=actx();await Promise.all(files.map(async({id,url})=>{if(_meme[id])return;try{const res=await fetch(url);const arr=await res.arrayBuffer();const buf=await new Promise((ok,fail)=>{const p=ctx.decodeAudioData(arr,ok,fail);if(p?.then)p.then(ok).catch(fail);});let off=0;try{const ch=buf.getChannelData(0);for(let i=0;i<ch.length;i++)if(Math.abs(ch[i])>.015){off=Math.max(0,i/buf.sampleRate-.015);break;}}catch(e){}  _meme[id]={buf,off};}catch(e){}  }));}
const MEME_IDS={laugh:'sound3',fire:'sound2',wow:'sound4',angry:'sound1'};
function playMeme(key){const id=MEME_IDS[key];const m=_meme[id];if(!m)return false;try{const ctx=actx();const s=ctx.createBufferSource();s.buffer=m.buf;const g=ctx.createGain();g.gain.value=1;s.connect(g);g.connect(ctx.destination);s.start(0,m.off);}catch(e){}return true;}
function playTone(fn){const ctx=actx();const fire=()=>{try{const now=ctx.currentTime;const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);fn(o,g,now);}catch(e){}};if(ctx.state==='suspended')ctx.resume().then(fire);else fire();}
function playSynth(key){switch(key){case'laugh':[520,480,560,500,460].forEach((f,i)=>playTone((o,g,now)=>{const t=now+i*.13;o.type='triangle';o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(f*1.4,t+.05);o.frequency.exponentialRampToValueAtTime(f*.85,t+.11);g.gain.setValueAtTime(1e-4,t);g.gain.exponentialRampToValueAtTime(.12,t+.015);g.gain.exponentialRampToValueAtTime(1e-4,t+.12);o.start(t);o.stop(t+.13);}));break;case'fire':playTone((o,g,now)=>{o.type='sawtooth';o.frequency.setValueAtTime(900,now);o.frequency.exponentialRampToValueAtTime(120,now+.9);g.gain.setValueAtTime(1e-4,now);g.gain.exponentialRampToValueAtTime(.1,now+.05);g.gain.exponentialRampToValueAtTime(1e-4,now+1);o.start(now);o.stop(now+1.05);});break;case'wow':playTone((o,g,now)=>{o.type='sine';o.frequency.setValueAtTime(300,now);o.frequency.exponentialRampToValueAtTime(720,now+.5);g.gain.setValueAtTime(1e-4,now);g.gain.exponentialRampToValueAtTime(.12,now+.08);g.gain.exponentialRampToValueAtTime(1e-4,now+.95);o.start(now);o.stop(now+1);});break;case'angry':playTone((o,g,now)=>{o.type='sawtooth';o.frequency.setValueAtTime(110,now);for(let i=0;i<6;i++)o.frequency.setValueAtTime(i%2?95:125,now+i*.13);g.gain.setValueAtTime(1e-4,now);g.gain.exponentialRampToValueAtTime(.13,now+.03);g.gain.exponentialRampToValueAtTime(1e-4,now+.85);o.start(now);o.stop(now+.9);});break;case'clap':for(let i=0;i<5;i++)playTone((o,g,now)=>{const t=now+i*.16;o.type='square';o.frequency.setValueAtTime(1200,t);o.frequency.exponentialRampToValueAtTime(400,t+.04);g.gain.setValueAtTime(1e-4,t);g.gain.exponentialRampToValueAtTime(.1,t+.005);g.gain.exponentialRampToValueAtTime(1e-4,t+.06);o.start(t);o.stop(t+.07);});break;}}
function playReaction(key){if(!playMeme(key))playSynth(key==='wave'?'clap':key);}
function mkNoiseBuf(d){const ctx=actx(),n=Math.ceil(ctx.sampleRate*d),b=ctx.createBuffer(1,n,ctx.sampleRate),da=b.getChannelData(0);for(let i=0;i<n;i++)da[i]=Math.random()*2-1;return b;}
function startNoise(){if(_nSrc)return;try{const ctx=actx(),now=ctx.currentTime;_nSrc=ctx.createBufferSource();_nSrc.buffer=mkNoiseBuf(.35);_nSrc.loop=true;const hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=1600;const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=4500;bp.Q.value=1.1;_nGain=ctx.createGain();_nGain.gain.setValueAtTime(.001,now);_nGain.gain.linearRampToValueAtTime(.32,now+.035);_nSrc.connect(hp);hp.connect(bp);bp.connect(_nGain);_nGain.connect(ctx.destination);_nSrc.start();}catch(e){}}
function stopNoise(){if(!_nSrc)return;try{const ctx=actx(),now=ctx.currentTime;_nGain.gain.setValueAtTime(_nGain.gain.value,now);_nGain.gain.linearRampToValueAtTime(.001,now+.055);const s=_nSrc;setTimeout(()=>{try{s.stop();}catch(e){}},80);}catch(e){}_nSrc=null;_nGain=null;}
function playSnap(){playTone((o,g,now)=>{o.type='sine';o.frequency.setValueAtTime(1100,now);o.frequency.exponentialRampToValueAtTime(600,now+.06);g.gain.setValueAtTime(.14,now);g.gain.exponentialRampToValueAtTime(.001,now+.07);o.start(now);o.stop(now+.07);});}
function playBoxDing(p){const ch=p===1?[523,659,784]:[440,554,659];ch.forEach((f,i)=>playTone((o,g,now)=>{const t=now+i*.06;o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.45);o.start(t);o.stop(t+.45);}));}
function playWin(){[392,523,659,784].forEach((f,i)=>playTone((o,g,now)=>{const t=now+i*.12;o.type='sine';o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(.001,t);g.gain.exponentialRampToValueAtTime(.12,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.start(t);o.stop(t+.26);}));}
function playLose(){[392,311,233].forEach((f,i)=>playTone((o,g,now)=>{const t=now+i*.15;o.type='triangle';o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(.001,t);g.gain.exponentialRampToValueAtTime(.1,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.31);}));}

// ══ GAME STATE ══
const G={size:3,mode:'local',diff:'easy',hL:[],vL:[],boxes:[],scores:[0,0],cur:1,over:false,history:[],aiOn:false,moveCount:0};
function initG(size,mode,diff){G.size=size;G.mode=mode;G.diff=diff;G.hL=Array.from({length:size+1},()=>new Array(size).fill(0));G.vL=Array.from({length:size},()=>new Array(size+1).fill(0));G.boxes=Array.from({length:size},()=>new Array(size).fill(0));G.scores=[0,0];G.cur=1;G.over=false;G.history=[];G.aiOn=false;G.moveCount=0;}
function snap(){return{hL:G.hL.map(r=>[...r]),vL:G.vL.map(r=>[...r]),boxes:G.boxes.map(r=>[...r]),scores:[...G.scores],cur:G.cur};}
function restore(s){G.hL=s.hL;G.vL=s.vL;G.boxes=s.boxes;G.scores=s.scores;G.cur=s.cur;}
function adjBoxes(t,r,c){return t==='h'?[[r-1,c],[r,c]]:[[r,c-1],[r,c]];}
function boxFull(br,bc,h,v){return !!(h[br][bc]&&h[br+1][bc]&&v[br][bc]&&v[br][bc+1]);}
function doPlace(type,row,col){if(type==='h'){if(G.hL[row][col])return -1;G.hL[row][col]=G.cur;}else{if(G.vL[row][col])return -1;G.vL[row][col]=G.cur;}let done=0;for(const [br,bc] of adjBoxes(type,row,col))if(br>=0&&br<G.size&&bc>=0&&bc<G.size&&boxFull(br,bc,G.hL,G.vL)&&G.boxes[br][bc]===0){G.boxes[br][bc]=G.cur;G.scores[G.cur-1]++;done++;}return done;}
function makeMove(type,row,col){if(G.over||G.aiOn)return;if(type==='h'&&G.hL[row][col])return;if(type==='v'&&G.vL[row][col])return;G.history.push(snap());const done=doPlace(type,row,col);if(done<0){G.history.pop();return;}G.moveCount++;stopNoise();playSnap();if(done>0)setTimeout(()=>playBoxDing(G.cur),90);if(G.scores[0]+G.scores[1]>=G.size*G.size){G.over=true;draw();updateUI();setTimeout(()=>showResult(),700);return;}if(done===0)G.cur=G.cur===1?2:1;draw();updateUI();if(!G.over&&G.mode==='ai'&&G.cur===2)triggerAI();}
function undoMove(){if(!G.history.length||G.aiOn)return;stopNoise();const cnt=G.mode==='ai'&&G.history.length>=2?2:1;for(let i=0;i<cnt&&G.history.length;i++)restore(G.history.pop());G.over=false;draw();updateUI();}

// ══ AI ══
function allMoves(s){const mv=[];for(let r=0;r<=s.size;r++)for(let c=0;c<s.size;c++)if(!s.hL[r][c])mv.push({t:'h',r,c});for(let r=0;r<s.size;r++)for(let c=0;c<=s.size;c++)if(!s.vL[r][c])mv.push({t:'v',r,c});return mv;}
function simMove(s,mv){const ns={size:s.size,hL:s.hL.map(r=>[...r]),vL:s.vL.map(r=>[...r]),boxes:s.boxes.map(r=>[...r]),scores:[...s.scores],cur:s.cur};if(mv.t==='h')ns.hL[mv.r][mv.c]=ns.cur;else ns.vL[mv.r][mv.c]=ns.cur;let done=0;for(const [br,bc] of adjBoxes(mv.t,mv.r,mv.c))if(br>=0&&br<ns.size&&bc>=0&&bc<ns.size&&boxFull(br,bc,ns.hL,ns.vL)&&ns.boxes[br][bc]===0){ns.boxes[br][bc]=ns.cur;ns.scores[ns.cur-1]++;done++;}if(done===0)ns.cur=ns.cur===1?2:1;return{ns,done};}
function sideCount(br,bc,s){return(s.hL[br][bc]?1:0)+(s.hL[br+1][bc]?1:0)+(s.vL[br][bc]?1:0)+(s.vL[br][bc+1]?1:0);}
function pickAI(){const st={size:G.size,hL:G.hL.map(r=>[...r]),vL:G.vL.map(r=>[...r]),boxes:G.boxes.map(r=>[...r]),scores:[...G.scores],cur:G.cur};const mvs=allMoves(st);if(!mvs.length)return null;if(G.diff==='easy')return mvs[Math.random()*mvs.length|0];const comp=mvs.filter(m=>simMove(st,m).done>0);if(comp.length)return comp[Math.random()*comp.length|0];if(G.diff==='medium')return mvs[Math.random()*mvs.length|0];const safe=mvs.filter(m=>{const{ns}=simMove(st,m);for(const [br,bc] of adjBoxes(m.t,m.r,m.c))if(br>=0&&br<ns.size&&bc>=0&&bc<ns.size&&sideCount(br,bc,ns)===3&&ns.boxes[br][bc]===0)return false;return true;});return(safe.length?safe:mvs)[Math.random()*(safe.length?safe:mvs).length|0];}
function triggerAI(){if(G.aiOn)return;G.aiOn=true;updateUI();const delay=G.diff==='hard'?700:G.diff==='medium'?480:320;setTimeout(()=>{G.aiOn=false;if(G.over)return;const m=pickAI();if(!m)return;G.history.push(snap());const done=doPlace(m.t,m.r,m.c);G.moveCount++;playSnap();if(done>0)setTimeout(()=>playBoxDing(2),90);if(G.scores[0]+G.scores[1]>=G.size*G.size){G.over=true;draw();updateUI();setTimeout(()=>showResult(),700);return;}if(done===0)G.cur=1;draw();updateUI();if(!G.over&&G.cur===2)triggerAI();},delay+Math.random()*220);}

// ══ CANVAS ══
const cvs=document.getElementById('gc'),ctx=cvs.getContext('2d');
let DPR=1,CW=0,CH=0,CELL=60,PX=30,PY=30;
const drag={dot:null,dir:null,cx:0,cy:0};
function dXY(col,row){return{x:PX+col*CELL,y:PY+row*CELL};}
function resizeCvs(){const w=document.getElementById('cw').clientWidth,h=document.getElementById('cw').clientHeight;if(!w||!h)return;DPR=window.devicePixelRatio||1;cvs.width=w*DPR;cvs.height=h*DPR;cvs.style.width=w+'px';cvs.style.height=h+'px';ctx.setTransform(DPR,0,0,DPR,0,0);CW=w;CH=h;CELL=Math.floor(Math.min((w-48)/G.size,(h-44)/G.size));PX=Math.floor((w-CELL*G.size)/2);PY=Math.floor((h-CELL*G.size)/2);draw();}
function rrect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function seg(x0,y0,x1,y1,glow,col){ctx.lineCap='round';ctx.strokeStyle=glow;ctx.lineWidth=9;ctx.globalAlpha=.4;ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();ctx.strokeStyle=col;ctx.lineWidth=5;ctx.globalAlpha=1;ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();}
function draw(){ctx.clearRect(0,0,CW,CH);const n=G.size;for(let r=0;r<n;r++)for(let c=0;c<n;c++){if(!G.boxes[r][c])continue;const{x,y}=dXY(c,r),p=G.boxes[r][c];ctx.fillStyle=p===1?'rgba(124,58,237,.23)':'rgba(225,29,72,.23)';rrect(x+3,y+3,CELL-6,CELL-6,8);ctx.fill();ctx.fillStyle=p===1?'rgba(167,139,250,.65)':'rgba(251,113,133,.65)';ctx.beginPath();ctx.arc(x+CELL/2,y+CELL/2,3.5,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=.09;ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.setLineDash([3,8]);for(let r=0;r<=n;r++)for(let c=0;c<n;c++)if(!G.hL[r][c]){const a=dXY(c,r),b=dXY(c+1,r);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}for(let r=0;r<n;r++)for(let c=0;c<=n;c++)if(!G.vL[r][c]){const a=dXY(c,r),b=dXY(c,r+1);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}ctx.setLineDash([]);ctx.globalAlpha=1;for(let r=0;r<=n;r++)for(let c=0;c<n;c++)if(G.hL[r][c]){const a=dXY(c,r),b=dXY(c+1,r),p=G.hL[r][c];seg(a.x,a.y,b.x,b.y,p===1?'rgba(124,58,237,.5)':'rgba(225,29,72,.5)',p===1?'#7c3aed':'#e11d48');}for(let r=0;r<n;r++)for(let c=0;c<=n;c++)if(G.vL[r][c]){const a=dXY(c,r),b=dXY(c,r+1),p=G.vL[r][c];seg(a.x,a.y,b.x,b.y,p===1?'rgba(124,58,237,.5)':'rgba(225,29,72,.5)',p===1?'#7c3aed':'#e11d48');}if(drag.dot&&drag.dir){const{x:sx,y:sy}=dXY(drag.dot.c,drag.dot.r);let ex=sx,ey=sy;if(drag.dir==='h'){const dc=drag.cx-sx,sgn=dc>=0?1:-1,tc=drag.dot.c+sgn;if(tc>=0&&tc<=G.size){const{x:tx}=dXY(tc,drag.dot.r);ex=sx+(tx-sx)*Math.min(1,Math.abs(dc)/CELL);}}else{const dy=drag.cy-sy,sgn=dy>=0?1:-1,tr=drag.dot.r+sgn;if(tr>=0&&tr<=G.size){const{y:ty}=dXY(drag.dot.c,tr);ey=sy+(ty-sy)*Math.min(1,Math.abs(dy)/CELL);}}const col=G.cur===1?'#a78bfa':'#fb7185';ctx.lineCap='round';ctx.strokeStyle=col;ctx.lineWidth=5;ctx.globalAlpha=.7;ctx.shadowColor=col;ctx.shadowBlur=14;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();ctx.globalAlpha=1;ctx.shadowBlur=0;}for(let r=0;r<=n;r++)for(let c=0;c<=n;c++){const{x,y}=dXY(c,r),isSt=drag.dot&&drag.dot.r===r&&drag.dot.c===c;if(isSt){ctx.shadowColor=G.cur===1?'#a78bfa':'#fb7185';ctx.shadowBlur=16;}ctx.fillStyle=isSt?(G.cur===1?'#a78bfa':'#fb7185'):'#505c7a';ctx.beginPath();ctx.arc(x,y,isSt?7:5.5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}}

// ══ DRAG ══
function nearDot(px,py){const snap=Math.max(30,CELL*.46);let best=null,bd=snap;for(let r=0;r<=G.size;r++)for(let c=0;c<=G.size;c++){const{x,y}=dXY(c,r),d=Math.hypot(px-x,py-y);if(d<bd){bd=d;best={r,c};}}return best;}
function evPt(e){const rect=cvs.getBoundingClientRect();const t=e.changedTouches?.[0]||e.touches?.[0]||e;return{px:t.clientX-rect.left,py:t.clientY-rect.top};}
function onStart(e){e.preventDefault();if(G.over||G.aiOn||(G.mode==='ai'&&G.cur===2))return;const{px,py}=evPt(e);const dot=nearDot(px,py);if(!dot)return;const{x:sx,y:sy}=dXY(dot.c,dot.r);drag.dot=dot;drag.dir=null;drag.cx=sx;drag.cy=sy;draw();}
function onMove(e){e.preventDefault();if(!drag.dot)return;const{px,py}=evPt(e);drag.cx=px;drag.cy=py;if(!drag.dir){const{x:sx,y:sy}=dXY(drag.dot.c,drag.dot.r);const dx=Math.abs(px-sx),dy=Math.abs(py-sy);if(dx>9||dy>9){drag.dir=dx>=dy?'h':'v';startNoise();}}draw();}
function onEnd(e){e.preventDefault();if(!drag.dot)return;stopNoise();const{r,c}=drag.dot;if(drag.dir){const{x:sx,y:sy}=dXY(c,r);if(drag.dir==='h'){const dx=drag.cx-sx;if(Math.abs(dx)>=CELL*.36){const tc=c+(dx>=0?1:-1);if(tc>=0&&tc<=G.size)makeMove('h',r,Math.min(c,tc));}}else{const dy=drag.cy-sy;if(Math.abs(dy)>=CELL*.36){const tr=r+(dy>=0?1:-1);if(tr>=0&&tr<=G.size)makeMove('v',Math.min(r,tr),c);}}}drag.dot=null;drag.dir=null;draw();}
function onCancel(){stopNoise();drag.dot=null;drag.dir=null;draw();}
cvs.addEventListener('mousedown',onStart);cvs.addEventListener('mousemove',onMove);cvs.addEventListener('mouseup',onEnd);cvs.addEventListener('mouseleave',onCancel);
cvs.addEventListener('touchstart',onStart,{passive:false});cvs.addEventListener('touchmove',onMove,{passive:false});cvs.addEventListener('touchend',onEnd,{passive:false});cvs.addEventListener('touchcancel',onCancel,{passive:false});

function buildRxStrip(){const strip=document.getElementById('rx-strip');strip.innerHTML=REACTIONS.map(r=>`<button class="rx-btn" data-key="${r.key}" style="--rc:${r.color}">${r.icon}</button>`).join('');strip.addEventListener('click',e=>{const b=e.target.closest('[data-key]');if(b)fireRx(b.dataset.key,b);});}
function fireRx(key,btn){btn?.classList.add('glow-'+key);setTimeout(()=>btn?.classList.remove('glow-'+key),500);playReaction(key);const r=REACTIONS.find(x=>x.key===key);if(!r)return;const art=`<span class="reaction-art reaction-art-anim" style="--rc:${r.color}">${r.art}</span>`;const el=document.createElement('div');el.className='floating-emoji floating-emoji-svg floating-reaction';el.innerHTML=art;const cw=document.getElementById('cw');const cwRect=cw.getBoundingClientRect();if(btn){const bRect=btn.getBoundingClientRect();el.style.left=Math.max(10,Math.min(85,((bRect.left+bRect.width/2-cwRect.left)/cwRect.width)*100))+'%';el.style.top='90%';}else{el.style.left=(40+Math.random()*20)+'%';el.style.top='85%';}cw.appendChild(el);el.addEventListener('animationend',()=>el.remove());try{window.Telegram?.WebApp?.HapticFeedback?.impactOccurred('medium');}catch(e){}}
