<!doctype html>
<html lang="uz">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
        />
        <meta name="theme-color" content="#0b0f19" />
        <title>To'siq Yo'l</title>
        <!-- Telegram WebApp SDK -->
        <script src="https://telegram.org/js/telegram-web-app.js"></script>
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="/src/main.js"></script>

        <!-- Classic (non-module) watchdog: runs even in old WebViews where ES modules
         may fail. If the app hasn't rendered after ~15 s, offer a retry. -->
        <script>
            (function () {
                function isLoaded() {
                    var app = document.getElementById("app");
                    return (
                        app &&
                        app.querySelector(
                            ".screen, .game-container, .login-wrap, .dotbox-fullscreen",
                        )
                    );
                }
                window.addEventListener("error", function (e) {
                    window.__lastErr =
                        (e && (e.message || (e.error && e.error.message))) ||
                        "script error";
                });
                // Show a friendly loading spinner immediately so the user sees activity.
                var app = document.getElementById("app");
                if (app && !isLoaded()) {
                    app.innerHTML =
                        '<div id="boot-spinner" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;font-family:sans-serif;color:#f1f5f9;">' +
                        '<svg width="40" height="40" viewBox="0 0 40 40" style="animation:spin 0.9s linear infinite;"><circle cx="20" cy="20" r="16" fill="none" stroke="#7c3aed" stroke-width="3.5" stroke-dasharray="70 30" stroke-linecap="round"/></svg>' +
                        "<style>@keyframes spin{to{transform:rotate(360deg)}}</style>" +
                        '<p style="font-size:14px;color:#9ca3af;margin:0;">Yuklanmoqda…</p>' +
                        "</div>";
                }
                setTimeout(function () {
                    if (isLoaded()) return;
                    var app = document.getElementById("app");
                    if (!app) return;
                    app.innerHTML =
                        '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;font-family:sans-serif;padding:24px;box-sizing:border-box;">' +
                        '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#fb7185" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
                        '<p style="font-size:15px;font-weight:600;color:#f1f5f9;margin:0;text-align:center;">Yuklanmadi</p>' +
                        '<p style="font-size:13px;color:#9ca3af;margin:0;text-align:center;">Internet aloqasini tekshirib qayta urining</p>' +
                        '<button onclick="location.reload()" style="margin-top:4px;padding:13px 28px;background:#7c3aed;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;">Qayta urinish</button>' +
                        "</div>";
                }, 15000);
            })();
        </script>
    </body>
</html>
